<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
    <link href="/src/output.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Todo Card -->
    <article
      data-testid="test-todo-card"
      class="relative max-w-120 bg-base flex flex-col gap-10 justify-center p-2 rounded-2xl shadow-lg"
    >
      <section
        role="region"
        class="bg-card w-full h-fit rounded-xl p-5 flex flex-col gap-5"
      >
        <div class="flex items-center justify-between gap-3">
          <div class="flex gap-2 items-center justify-start">
            <input
              type="checkbox"
              id="toggle-completed"
              name="toggle-completed"
              data-testid="test-todo-complete-toggle"
              aria-label="Mark task as completed"
              class="w-5 h-5 accent-title cursor-pointer"
            />
            <label id="toggle-label" for="toggle-completed" class="sr-only">
              Mark task as completed
            </label>

            <h2
              data-testid="test-todo-title"
              class="text-xl md:text-2xl font-bold"
            >
              Design new landing page
            </h2>
          </div>
          <span
            data-testid="test-todo-priority"
            aria-label="Priority: High"
            class="rounded-full high-priority text-lg font-semibold text-right"
            >High</span
          >
        </div>

        <p data-testid="test-todo-description">
          Create wireframes and high-fidelity mockups for the product redesign.
          Share with the team for review before handoff to development.
        </p>

        <span
          data-testid="test-todo-status"
          aria-label="Status: In Progress"
          class="status-progress"
          >In Progress</span
        >

        <div class="flex items-center justify-between gap-2 text-sm text-muted">
          <time
            datetime="2026-04-16T18:00:00Z"
            data-testid="test-todo-due-date"
            class="flex items-center gap-1"
          >
            📅 Due Apr 16, 2026
          </time>

          <span
            data-testid="test-todo-time-remaining"
            aria-live="polite"
            class="text-xs bg-base px-3 py-1 rounded-full font-medium text-muted"
          >
          </span>
        </div>

        <ul
          role="list"
          data-testid="test-todo-tags"
          class="flex flex-row flex-wrap gap-2 list-none p-0 m-0"
        >
          <li
            data-testid="test-todo-tag-work"
            class="bg-progress text-off-white text-xs font-medium px-3 py-1 rounded-full w-fit"
          >
            Work
          </li>
          <li
            data-testid="test-todo-tag-urgent"
            class="bg-delete text-off-white text-xs font-medium px-3 py-1 rounded-full w-fit"
          >
            Urgent
          </li>
          <li
            class="bg-priority-med text-off-white text-xs font-medium px-3 py-1 rounded-full w-fit"
          >
            Design
          </li>
        </ul>
      </section>

      <div role="group" aria-label="Task actions" class="flex gap-5 w-full">
        <button
          data-testid="test-todo-edit-button"
          aria-label="Edit task"
          class="w-full px-5 py-3 rounded-full bg-edit text-off-white hover:bg-edit-hover"
          onclick="console.log('Edit button clicked!')"
        >
          Edit
        </button>
        <button
          data-testid="test-todo-delete-button"
          aria-label="Delete task"
          class="w-full px-5 py-3 rounded-full bg-delete text-off-white hover:bg-delete-hover"
          onclick="console.log('Delete button clicked!')"
        >
          Delete
        </button>
      </div>
    </article>

    <script src="script.js"></script>
  </body>
</html>
